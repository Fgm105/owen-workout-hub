<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardio Workout</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Cardio Workouts</h1>

    <div class="workout-day">
        <h2>Day 1</h2>
        <div class="circuit-grid">
            <div class="card">
                <div class="card-info">
                    <span class="exercise-number">1</span>
                    <span class="exercise-name">Jumping Jacks</span>
                    <span class="exercise-english-name">Jumping Jacks</span>
                </div>
                <button class="rest-button">Rest</button>
            </div>
            <div class="card">
                <div class="card-info">
                    <span class="exercise-number">2</span>
                    <span class="exercise-name">High Knees</span>
                    <span class="exercise-english-name">High Knees</span>
                </div>
                <button class="rest-button">Rest</button>
            </div>
            <!-- Add more exercises as needed -->
        </div>
    </div>

    <div class="workout-day">
        <h2>Day 2</h2>
        <div class="circuit-grid">
            <div class="card">
                <div class="card-info">
                    <span class="exercise-number">1</span>
                    <span class="exercise-name">Burpees</span>
                    <span class="exercise-english-name">Burpees</span>
                </div>
                <button class="rest-button">Rest</button>
            </div>
            <div class="card">
                <div class="card-info">
                    <span class="exercise-number">2</span>
                    <span class="exercise-name">Mountain Climbers</span>
                    <span class="exercise-english-name">Mountain Climbers</span>
                </div>
                <button class="rest-button">Rest</button>
            </div>
            <!-- Add more exercises as needed -->
        </div>
    </div>

    <div class="workout-day">
        <h2>Day 3</h2>
        <div class="circuit-grid">
            <div class="card">
                <div class="card-info">
                    <span class="exercise-number">1</span>
                    <span class="exercise-name">Squats</span>
                    <span class="exercise-english-name">Squats</span>
                </div>
                <button class="rest-button">Rest</button>
            </div>
            <div class="card">
                <div class="card-info">
                    <span class="exercise-number">2</span>
                    <span class="exercise-name">Lunges</span>
                    <span class="exercise-english-name">Lunges</span>
                </div>
                <button class="rest-button">Rest</button>
            </div>
            <!-- Add more exercises as needed -->
        </div>
    </div>

    <div class="workout-day">
        <h2>Day 4</h2>
        <div class="circuit-grid">
            <div class="card">
                <div class="card-info">
                    <span class="exercise-number">1</span>
                    <span class="exercise-name">Plank</span>
                    <span class="exercise-english-name">Plank</span>
                </div>
                <button class="rest-button">Rest</button>
            </div>
            <div class="card">
                <div class="card-info">
                    <span class="exercise-number">2</span>
                    <span class="exercise-name">Butt Kicks</span>
                    <span class="exercise-english-name">Butt Kicks</span>
                </div>
                <button class="rest-button">Rest</button>
            </div>
            <!-- Add more exercises as needed -->
        </div>
    </div>
</body>
</html>
